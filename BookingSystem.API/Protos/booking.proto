syntax = "proto3";

option csharp_namespace = "BookingSystem.API.Grpc";

package booking;

service BookingGrpc {
  rpc GetBooking (GetBookingRequest) returns (BookingReply);
  rpc CheckAvailability (CheckAvailabilityRequest) returns (CheckAvailabilityReply);
}

message GetBookingRequest {
  string id = 1;
}

message CheckAvailabilityRequest {
  string property_id = 1;
  string check_in = 2;
  string check_out = 3;
}

message BookingReply {
  string id = 1;
  string property_id = 2;
  string property_title = 3;
  string check_in = 4;
  string check_out = 5;
  double total_price = 6;
  string status = 7;
  string payment_status = 8;
}

message CheckAvailabilityReply {
  bool is_available = 1;
  string message = 2;
}
