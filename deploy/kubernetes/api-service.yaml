apiVersion: v1
kind: Service
metadata:
  name: booking-api-service
  namespace: booking-system
  labels:
    app: booking-api
spec:
  type: ClusterIP
  selector:
    app: booking-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: grpc
      port: 8081
      targetPort: 8081
